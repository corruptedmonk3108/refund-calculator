<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entry Summary Refund Calculator</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.10);
      padding: 40px 44px;
      width: 100%;
      max-width: 560px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #111;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: #666;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .drop-zone {
      border: 2px dashed #d0d5dd;
      border-radius: 10px;
      padding: 36px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #fafafa;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: #4f46e5;
      background: #f0efff;
    }
    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon { font-size: 36px; margin-bottom: 10px; }

    .drop-label { font-size: 14px; color: #444; font-weight: 500; }
    .drop-label span { color: #4f46e5; text-decoration: underline; text-underline-offset: 2px; }

    .drop-hint { font-size: 12px; color: #999; margin-top: 6px; }

    .file-chosen {
      margin-top: 12px;
      font-size: 13px;
      color: #4f46e5;
      font-weight: 500;
      min-height: 18px;
    }

    .btn {
      display: block;
      width: 100%;
      margin-top: 24px;
      padding: 13px;
      background: #4f46e5;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }
    .btn:hover:not(:disabled) { background: #4338ca; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .status {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.6;
      display: none;
    }
    .status.error   { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .status.success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .status.info    { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }

    .download-btn {
      display: inline-block;
      margin-top: 14px;
      padding: 10px 20px;
      background: #16a34a;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .download-btn:hover { background: #15803d; }

    .summary-stats { margin-top: 10px; font-size: 12px; color: #555; }
    .summary-stats b { color: #111; }
  </style>
</head>
<body>
<div class="card">
  <h1>Entry Summary Refund Calculator</h1>
  <p class="subtitle">
    Upload an Entry Summary Line Tariff Details Excel file.<br>
    The tool produces a 3-sheet Excel workbook: refund summary, line detail, and non-refundable lines.
  </p>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" />
    <div class="drop-icon">📂</div>
    <div class="drop-label"><span>Choose a file</span> or drag it here</div>
    <div class="drop-hint">Accepts .xlsx / .xls / .csv files</div>
  </div>
  <div class="file-chosen" id="fileChosen"></div>

  <button class="btn" id="processBtn" disabled>Calculate Refunds</button>

  <div class="status" id="statusBox"></div>
</div>

// ─── HTS helpers ──────────────────────────────────────────────────────────────
function normalizeHTS(raw) {
  if (raw == null) return "";
  return String(raw).replace(/\./g, "").trim().toUpperCase().padEnd(10, "0");
}

function expandHTSRange(code) {
  const dashIdx = code.lastIndexOf("-");
  if (dashIdx === -1) return [code];
  const startCode  = code.substring(0, dashIdx);
  const endSuffix  = code.substring(dashIdx + 1);
  const lastDot    = startCode.lastIndexOf(".");
  const prefix     = startCode.substring(0, lastDot + 1);
  const startSuffix = startCode.substring(lastDot + 1);
  const startNum   = parseInt(startSuffix, 10);
  const endNum     = parseInt(endSuffix, 10);
  const padLen     = Math.max(startSuffix.length, endSuffix.length);
  const result     = [];
  for (let i = startNum; i <= endNum; i++) {
    result.push(prefix + String(i).padStart(padLen, "0"));
  }
  return result;
}

// ─── Build eligible map: normalizedHTS → {authority, whyRefundable} ───────────
function buildEligibleMap() {
  const map = new Map();
  for (const entry of ELIGIBLE_RAW) {
    for (const code of expandHTSRange(entry.code)) {
      map.set(normalizeHTS(code), { authority: entry.authority, whyRefundable: entry.whyRefundable });
    }
  }
  return map;
}

// ─── Build not-eligible lookup (handles ranges, wildcards, + notation) ─────────
function buildNotEligibleLookup() {
  const exactMap   = new Map();
  const prefixList = []; // .xx wildcards
  const plusList   = []; // 71+ style — matches >= from within same family

  for (const entry of NOT_ELIGIBLE_RAW) {
    const code = String(entry.code || "");
    const data = { authority: entry.authority, description: entry.description, whyNot: entry.whyNot };

    if (!code.startsWith("99")) continue; // skip non-HTS entries

    if (/\.xx/i.test(code)) {
      const prefix = code.replace(/\.xx.*/i, "").replace(/\./g, "").toUpperCase();
      prefixList.push({ prefix, ...data });
      continue;
    }

    if (code.endsWith("+")) {
      const fromNorm    = normalizeHTS(code.slice(0, -1));
      const familyPrefix = fromNorm.substring(0, 6);
      plusList.push({ from: fromNorm, familyPrefix, ...data });
      continue;
    }

    if (code.includes("-")) {
      for (const c of expandHTSRange(code)) {
        exactMap.set(normalizeHTS(c), data);
      }
      continue;
    }

    exactMap.set(normalizeHTS(code), data);
  }

  return function lookup(norm) {
    if (exactMap.has(norm)) return exactMap.get(norm);
    for (const p of prefixList) {
      if (norm.startsWith(p.prefix)) return { authority: p.authority, description: p.description, whyNot: p.whyNot };
    }
    for (const r of plusList) {
      if (norm.startsWith(r.familyPrefix) && norm >= r.from) {
        return { authority: r.authority, description: r.description, whyNot: r.whyNot };
      }
    }
    return null;
  };
}

// ─── Number parsing (handles plain numbers and currency strings like "$1,234.56") ──
function parseAmount(raw) {
  if (raw == null) return NaN;
  if (typeof raw === "number") return raw;
  let s = String(raw).replace(/\$/g, "").trim();
  const lastComma = s.lastIndexOf(",");
  const lastDot   = s.lastIndexOf(".");
  if (lastComma > lastDot) {
    // European format: "5.646,00" → 5646.00
    s = s.replace(/\./g, "").replace(",", ".");
  } else {
    // US format: "1,234.56" → 1234.56
    s = s.replace(/,/g, "");
  }
  return parseFloat(s);
}

// ─── Eligible entry types ─────────────────────────────────────────────────────
const ELIGIBLE_ENTRY_TYPES = new Set(["01", "11", "21", "31"]);

function normalizeEntryType(raw) {
  if (raw == null) return "";
  return String(raw).trim().padStart(2, "0");
}

// ─── Core calculation ─────────────────────────────────────────────────────────
function calculate(rows, eligibleMap, notEligibleLookup) {
  const refundByEntry = new Map();
  const sheet2Rows    = [];
  const sheet3Rows    = [];

  for (const row of rows) {
    const htsRaw  = row["HTS Number - Full"];
    const htsNorm = normalizeHTS(htsRaw);
    const entryNum = row["Entry Summary Number"];

    if (!htsNorm.startsWith("99")) continue;

    if (!eligibleMap.has(htsNorm)) {
      // Sheet 3: all non-eligible 99xx rows, no other conditions
      const info = notEligibleLookup(htsNorm);
      const fallback = "Not found in eligibility reference";
      sheet3Rows.push([
        entryNum,
        htsRaw,
        info ? info.authority    : fallback,
        info ? info.description  : fallback,
        info ? info.whyNot       : fallback,
      ]);
      continue;
    }

    // Sheet 1 & 2: apply remaining conditions
    const goodsVal  = parseAmount(row["Line Tariff Goods Value Amount"]);
    const dutyAmt   = parseAmount(row["Line Tariff Duty Amount"]);
    const entryType = normalizeEntryType(row["Entry Type Code"]);

    if (!ELIGIBLE_ENTRY_TYPES.has(entryType)) continue;
    if (goodsVal !== 0) continue;
    if (!(dutyAmt > 0)) continue;

    const info = eligibleMap.get(htsNorm);
    refundByEntry.set(entryNum, (refundByEntry.get(entryNum) || 0) + dutyAmt);
    sheet2Rows.push([
      entryNum,
      parseFloat(dutyAmt.toFixed(2)),
      htsRaw,
      info.authority,
      info.whyRefundable,
    ]);
  }

  return { refundByEntry, sheet2Rows, sheet3Rows };
}

// ─── Build Excel workbook ─────────────────────────────────────────────────────
function buildWorkbook(refundByEntry, sheet2Rows, sheet3Rows) {
  const wb = XLSX.utils.book_new();

  // Sheet 1 — Refund Summary (one row per entry)
  const s1 = [["Entry Summary Number", "Refund"]];
  for (const [entryNum, total] of refundByEntry.entries()) {
    s1.push([entryNum, parseFloat(total.toFixed(2))]);
  }
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(s1), "Refund Summary");

  // Sheet 2 — Refund Line Detail
  const s2 = [["Entry Summary Number", "Refund", "HTS Number - Full", "Authority", "Why Refundable"]];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(s2.concat(sheet2Rows)), "Refund Line Detail");

  // Sheet 3 — Non-Refundable Lines
  const s3 = [["Entry Summary Number", "HTS Number - Full", "Authority", "Product / Description", "Why NOT Refundable"]];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(s3.concat(sheet3Rows)), "Non-Refundable Lines");

  return wb;
}

// ─── UI ───────────────────────────────────────────────────────────────────────
const dropZone   = document.getElementById("dropZone");
const fileInput  = document.getElementById("fileInput");
const fileChosen = document.getElementById("fileChosen");
const processBtn = document.getElementById("processBtn");
const statusBox  = document.getElementById("statusBox");

let selectedFile = null;

function setFile(file) {
  if (!file) return;
  selectedFile = file;
  fileChosen.textContent = "Selected: " + file.name;
  processBtn.disabled = false;
  clearStatus();
}

fileInput.addEventListener("change", () => setFile(fileInput.files[0]));

dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("dragover"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
dropZone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropZone.classList.remove("dragover");
  const file = e.dataTransfer.files[0];
  if (file) { fileInput.files = e.dataTransfer.files; setFile(file); }
});

function showStatus(type, html) {
  statusBox.className = "status " + type;
  statusBox.style.display = "block";
  statusBox.innerHTML = html;
}
function clearStatus() { statusBox.style.display = "none"; statusBox.innerHTML = ""; }

processBtn.addEventListener("click", () => {
  if (!selectedFile) return;
  showStatus("info", "Processing file…");
  processBtn.disabled = true;

  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = new Uint8Array(e.target.result);
      const readOpts = { type: "array" };
      if (selectedFile.name.toLowerCase().endsWith(".csv")) {
        const firstLine = new TextDecoder().decode(data.slice(0, 2000)).split(/\r?\n/)[0];
        const semicolons = (firstLine.match(/;/g) || []).length;
        const commas     = (firstLine.match(/,/g) || []).length;
        if (semicolons > commas) readOpts.FS = ";";
      }
      const wb   = XLSX.read(data, readOpts);
      const ws   = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: null });

      if (rows.length === 0) {
        showStatus("error", "The file appears to be empty or has no data rows.");
        processBtn.disabled = false;
        return;
      }

      const required = ["Entry Summary Number", "Entry Type Code", "HTS Number - Full",
                        "Line Tariff Goods Value Amount", "Line Tariff Duty Amount"];
      const missing = required.filter(h => !(h in rows[0]));
      if (missing.length > 0) {
        showStatus("error", "Missing required columns:<br><b>" + missing.join(", ") + "</b>");
        processBtn.disabled = false;
        return;
      }

      const eligibleMap       = buildEligibleMap();
      const notEligibleLookup = buildNotEligibleLookup();
      const { refundByEntry, sheet2Rows, sheet3Rows } = calculate(rows, eligibleMap, notEligibleLookup);
      const outWb             = buildWorkbook(refundByEntry, sheet2Rows, sheet3Rows);

      const baseName = selectedFile.name.replace(/\.[^.]+$/, "");
      XLSX.writeFile(outWb, baseName + "_Refund_Analysis.xlsx");

      // Also download a CSV of just the entry numbers
      const csvLines = ["Entry Number", ...[...refundByEntry.keys()].map(n => `"${String(n).replace(/"/g, '""')}"`)];
      const csvBlob = new Blob([csvLines.join("\r\n")], { type: "text/csv;charset=utf-8;" });
      const csvUrl = URL.createObjectURL(csvBlob);
      const csvA = document.createElement("a");
      csvA.href = csvUrl;
      csvA.download = baseName + "_Entry_Numbers.csv";
      document.body.appendChild(csvA);
      csvA.click();
      document.body.removeChild(csvA);
      setTimeout(() => URL.revokeObjectURL(csvUrl), 2000);

      const totalRefund = [...refundByEntry.values()].reduce((a, b) => a + b, 0);

      showStatus("success",
        "<strong>Done! File download has started.</strong>" +
        "<div class='summary-stats'>" +
        "Eligible entries: <b>" + refundByEntry.size + "</b> &nbsp;|&nbsp;" +
        "Total refund: <b>$" + totalRefund.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + "</b> &nbsp;|&nbsp;" +
        "Non-refundable lines: <b>" + sheet3Rows.length + "</b>" +
        "</div>"
      );

    } catch (err) {
      showStatus("error", "Failed to process file: " + err.message);
    }
    processBtn.disabled = false;
  };

  reader.onerror = () => {
    showStatus("error", "Could not read the file. Please try again.");
    processBtn.disabled = false;
  };

  reader.readAsArrayBuffer(selectedFile);
});
</script>
